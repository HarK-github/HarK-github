<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="auto">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7928CA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0080;stop-opacity:1" />
      <animate attributeName="x1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0080;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#7928CA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FF0080;stop-opacity:0.6" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#7928CA" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="none"/>
  
  <!-- Animated Gradient Text -->
  <text x="400" y="85" font-family="'Fira Code', 'Courier New', monospace" font-size="56" 
        font-weight="bold" fill="url(#grad)" text-anchor="middle" filter="url(#glow)">
    Harshit Kandpal
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="20" 
        fill="#9CA3AF" text-anchor="middle" letter-spacing="3">
    FULL STACK DEVELOPER
  </text>
  
  <!-- Decorative line -->
  <line x1="200" y1="155" x2="600" y2="155" stroke="url(#glowGrad)" stroke-width="2" 
        stroke-linecap="round">
    <animate attributeName="x1" values="250;150;250" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="550;650;550" dur="4s" repeatCount="indefinite"/>
  </line>
  
  <!-- Small decorative dots -->
  <circle cx="180" cy="155" r="3" fill="#FF0080" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="155" r="3" fill="#7928CA" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <!-- Code brackets -->
  <text x="100" y="85" font-family="'Fira Code', monospace" font-size="56" 
        fill="#4B5563" text-anchor="middle" opacity="0.5">&lt;/&gt;</text>
  <text x="700" y="85" font-family="'Fira Code', monospace" font-size="56" 
        fill="#4B5563" text-anchor="middle" opacity="0.5">&lt;/&gt;</text>
</svg>
