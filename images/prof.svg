<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="auto">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="none"/>
  
  <!-- Stylish Italic White Text -->
  <text x="400" y="85" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="58" 
        font-weight="700" font-style="italic" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    Harshit Kandpal
  </text>
  
  <!-- Decorative line -->
  <line x1="200" y1="155" x2="600" y2="155" stroke="url(#glowGrad)" stroke-width="2" 
        stroke-linecap="round">
    <animate attributeName="x1" values="250;150;250" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="550;650;550" dur="4s" repeatCount="indefinite"/>
  </line>
  
  <!-- Small decorative dots -->
  <circle cx="180" cy="155" r="3" fill="#FFFFFF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="155" r="3" fill="#FFFFFF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <!-- Code brackets -->
  <text x="100" y="85" font-family="'Fira Code', monospace" font-size="56" 
        fill="#4B5563" text-anchor="middle" opacity="0.5" font-style="normal">&lt;/&gt;</text>
  <text x="700" y="85" font-family="'Fira Code', monospace" font-size="56" 
        fill="#4B5563" text-anchor="middle" opacity="0.5" font-style="normal">&lt;/&gt;</text>
</svg>
